# ALSA configuration for LillyCam I2S audio devices.
# Copy to /etc/asound.conf on the Pi (or ~/.asoundrc for user-level).
#
# Requires boot/config.txt overlays (see config/config.txt.snippet):
#   dtoverlay=i2s-mmap
#   dtoverlay=googlevoicehat-soundcard   (or rpi-proto / googlevoicehat depending on your kernel)
#
# Device names used by lillycam/audio.py:
#   "mic"     -> INMP441 I2S microphone (capture)
#   "speaker" -> MAX98357A I2S amplifier (playback)

pcm._sndrpi {
    type hw
    card sndrpigooglevoi
    device 0
    subdevice 0
}

# plug wraps the hw device with explicit stereo + S32_LE constraints.
# googlevoicehat only accepts S32_LE stereo; without these, mono/16-bit
# audio plays at half speed because plug does not auto-upmix channels.
pcm.mic {
    type plug
    slave {
        pcm     "_sndrpi"
        channels 2
        rate     48000
        format   S32_LE
    }
}

pcm.speaker {
    type plug
    slave {
        pcm     "_sndrpi"
        channels 2
        rate     48000
        format   S32_LE
    }
}

ctl.mic     { type hw; card sndrpigooglevoi; }
ctl.speaker { type hw; card sndrpigooglevoi; }

pcm.!default {
    type asym
    playback.pcm "speaker"
    capture.pcm  "mic"
}

ctl.!default { type hw; card sndrpigooglevoi; }
