# systemd drop-in override for pigpiod.
#
# Forces pigpiod to use the PWM peripheral as its DMA clock source (-t 0)
# instead of the default PCM peripheral (-t 1).
#
# On the Pi Zero W, pigpiod's PCM timing steals every other I2S clock tick,
# causing audio playback and capture to run at half speed. Switching to PWM
# timing frees the PCM peripheral for the googlevoicehat I2S driver.
#
# Deploy:
#   sudo mkdir -p /etc/systemd/system/pigpiod.service.d/
#   sudo cp config/pigpiod-override.conf /etc/systemd/system/pigpiod.service.d/override.conf
#   sudo systemctl daemon-reload && sudo systemctl restart pigpiod

[Service]
ExecStart=
ExecStart=/usr/bin/pigpiod -l -t 0
